<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  
  <!-- Accent orb left -->
  <circle cx="100" cy="315" r="200" fill="#3b82f6" opacity="0.15"/>
  
  <!-- Accent orb right -->
  <circle cx="1100" cy="315" r="200" fill="#8b5cf6" opacity="0.15"/>
  
  <!-- Logo -->
  <text x="80" y="100" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#ffffff">
    <tspan fill="#dc2626">▲</tspan> Ascendant Strategy
  </text>
  
  <!-- Main headline -->
  <text x="80" y="280" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="#ffffff">
    NZ's #1 Sales
  </text>
  <text x="80" y="360" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="url(#accent)">
    Funnel Agency
  </text>
  
  <!-- Stats row -->
  <g transform="translate(80, 450)">
    <text font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#ffffff">
      <tspan>240+</tspan>
      <tspan font-size="18" fill="#9ca3af"> Funnels</tspan>
    </text>
    <text x="250" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#ffffff">
      <tspan>$18M+</tspan>
      <tspan font-size="18" fill="#9ca3af"> Generated</tspan>
    </text>
    <text x="500" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#ffffff">
      <tspan>3.2x</tspan>
      <tspan font-size="18" fill="#9ca3af"> Avg Lift</tspan>
    </text>
  </g>
  
  <!-- CTA hint -->
  <text x="80" y="580" font-family="system-ui, sans-serif" font-size="20" fill="#9ca3af">
    ascendant.company →
  </text>
</svg>